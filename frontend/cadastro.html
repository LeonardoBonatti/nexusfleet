<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Criar Conta - Posto Bonrita</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {

            background-image: url("cadastro-bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            font-family: 'Segoe UI', sans-serif;

        }

        .overlay {

            position: absolute;
            inset: 0;

            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);

        }

        .container-box {

            position: relative;
            z-index: 2;

            width: 900px;
            max-width: 95%;

            display: grid;
            grid-template-columns: 1fr 400px;

            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;

            backdrop-filter: blur(14px);

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);

            overflow: hidden;

        }

        .welcome {

            padding: 60px;
            color: white;

            display: flex;
            flex-direction: column;
            justify-content: center;

        }

        .welcome h1 {

            font-size: 40px;
            font-weight: 700;

        }

        .welcome p {

            font-size: 18px;
            opacity: 0.9;

        }

        .card-form {

            background: white;
            padding: 40px;

        }

        .card-form h3 {

            text-align: center;
            margin-bottom: 25px;

        }

        .form-control {

            border-radius: 10px;
            padding: 12px;

        }

        .btn-cadastro {

            background: #0d6efd;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;

        }

        .btn-cadastro:hover {

            background: #0b5ed7;

        }

        .login-link {

            text-align: center;
            margin-top: 15px;

        }
    </style>

</head>

<body>

    <div class="overlay"></div>

    <div class="container-box">

        <!-- LADO ESQUERDO -->

        <div class="welcome">

            <h1>Que bom ter você aqui conosco!</h1>

            <p>
                Crie sua conta e comece a controlar seus abastecimentos
                de forma inteligente, acompanhando gastos,
                consumo e histórico completo do seu veículo.
            </p>

        </div>

        <!-- LADO DIREITO -->

        <div class="card-form">

            <h3>Criar Conta</h3>

            <input class="form-control mb-3" id="nome" placeholder="Seu nome">

            <input class="form-control mb-3" id="email" type="email" placeholder="Seu email">

            <input class="form-control mb-3" id="senha" type="password" placeholder="Sua senha">

            <button class="btn btn-cadastro w-100" onclick="cadastrar()">

                <i class="fa fa-user-plus"></i> Criar Conta

            </button>

            <div class="login-link">

                <a href="login.html">
                    Já possui conta? Fazer login
                </a>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
