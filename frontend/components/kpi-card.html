<!-- kpi-card.html (Template Componente) -->
<div class="kpi-card {{alert_class}}">
    <div class="kpi-icon"><i class="fa-solid {{icon}}"></i></div>
    <div class="kpi-info">
        <h3>{{title}}</h3>
        <p>{{value}}</p>
        <span class="trend {{trend_class}}"><i class="fa-solid {{trend_icon}}"></i> {{trend_text}}</span>
    </div>
</div>
