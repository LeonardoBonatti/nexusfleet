<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Nexus Fleet - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-image: url("posto.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        /* corpo da bomba */

        .bomba {

            position: relative;
            z-index: 2;

            width: 360px;
            padding: 100px 35px 40px 35px;

            border-radius: 18px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(14px);

            border: 1px solid rgba(255, 255, 255, 0.25);

            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);

            color: white;
        }

        /* visor da bomba */

        .visor {

            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);

            width: 210px;
            height: 70px;

            border-radius: 10px;

            background: #111;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }

        .visor span {
            font-size: 12px;
            opacity: 0.7;
        }

        .visor strong {
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* mangueira lateral */

        .mangueira {

            position: absolute;
            right: -30px;
            top: 120px;

            width: 20px;
            height: 140px;

            border-radius: 20px;

            background: #222;
        }

        /* inputs */

        .form-control {

            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;

            padding: 12px;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .form-control:focus {

            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            box-shadow: none;
            color: white;
        }

        /* botão */

        .btn-login {

            background: white;
            color: #333;

            font-weight: 600;

            border: none;
            border-radius: 10px;

            padding: 12px;

            transition: 0.3s;
        }

        .btn-login:hover {

            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);

        }

        /* botão quem somos */

        .btn-quem {

            border: 1px solid rgba(255, 255, 255, 0.6);
            color: white;

            border-radius: 10px;
            padding: 10px;

            transition: 0.3s;
        }

        .btn-quem:hover {

            background: white;
            color: black;

        }

        .contact {

            margin-top: 15px;
            font-size: 14px;
            opacity: 0.9;

        }

        .contact i {

            margin-right: 8px;

        }

        a {
            color: white;
            text-decoration: none;
        }

        footer {

            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: white;
            opacity: 0.8;

        }
    </style>
</head>

<body>

    <div class="bomba">

        <div class="visor">
            <span>NEXUS FLEET</span>
            <strong>SISTEMA</strong>
        </div>

        <div class="mangueira"></div>

        <input class="form-control mb-3" id="email" type="email" placeholder="Email">

        <input class="form-control mb-3" id="senha" type="password" placeholder="Senha">

        <button class="btn btn-login w-100 mb-3" onclick="login()">
            Entrar
        </button>

        <div class="text-center mb-2">
            <a href="cadastro.html">Criar conta</a>
        </div>

        <div class="text-center mb-3">
            <a href="quem-somos.html" target="_blank" class="btn btn-quem w-100">
                <i class="fa fa-building"></i> Quem Somos
            </a>
        </div>

        <hr style="border-color:rgba(255,255,255,0.3)">

        <div class="contact text-center">

            <p><i class="fa fa-phone"></i> (19) 98203-4157</p>

            <p><i class="fa fa-phone"></i> (19) 99665-8075</p>

            <p><i class="fa fa-envelope"></i> leonardobfds@fam.edu.br</p>

        </div>

    </div>

    <footer>
        © 2026 Nexus Fleet - Gestão Inteligente de Frota
    </footer>

    <script src="script.js"></script>

</body>

</html>
