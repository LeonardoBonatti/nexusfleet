<!-- veiculos.html -->
<div class="page-header">
    <h2><i class="fa-solid fa-car" style="color: var(--primary-color);"></i> Gestão de Veículos</h2>
    <p>Cadastre e gerencie a frota de veículos. Placa no padrão <b>Mercosul</b> (ABC1D23) ou antigo (ABC1234).</p>
</div>

<div class="form-container">
    <form id="vehicleForm">
        <div class="form-row">
            <div class="form-group">
                <label><i class="fa-solid fa-id-card"></i> Placa do Veículo (Mercosul ou Antigo)</label>
                <input type="text" name="plate" id="plateInput" placeholder="Ex: ABC1D23 ou ABC1234" maxlength="7" required oninput="formatPlate(this)">
                <small id="plateHint" style="color: var(--text-muted); font-size: 0.8rem;">Formato: 3 letras + 1 número + 1 letra + 2 números (Mercosul) ou 3 letras + 4 números (Antigo)</small>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-truck"></i> Modelo / Versão</label>
                <input type="text" name="model" placeholder="Ex: Gol 1.0 Flex" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label><i class="fa-solid fa-copyright"></i> Fabricante (Marca)</label>
                <input type="text" name="brand" placeholder="Ex: Volkswagen" required>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-calendar"></i> Ano de Fabricação</label>
                <input type="number" name="year" placeholder="Ex: 2020" min="1950" max="2100" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label><i class="fa-solid fa-gas-pump"></i> Tipo Padrão de Combustível</label>
                <select name="fuel_type" required>
                    <option value="Flex">Flex (Gasolina/Álcool)</option>
                    <option value="Gasolina">Gasolina</option>
                    <option value="Álcool">Álcool / Etanol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="GNV">GNV (Gás Natural)</option>
                    <option value="Elétrico">Elétrico</option>
                    <option value="Híbrido">Híbrido</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-box"></i> Capacidade do Tanque (Litros)</label>
                <input type="number" step="0.5" name="capacity" placeholder="Ex: 55" min="1" max="1000" required>
            </div>
        </div>

        <button type="submit" class="btn-primary"><i class="fa-solid fa-plus"></i> Registrar Veículo na Frota</button>
    </form>
</div>

<!-- CONTAINER DE VEÍCULOS SALVOS -->
<div class="form-container" style="max-width: 100%; margin-top: 30px;">
    <h3 style="margin-bottom: 15px; color: var(--text-main);"><i class="fa-solid fa-list"></i> Frota Ativa</h3>
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted);">
                    <th style="padding: 10px;">ID Frota</th>
                    <th style="padding: 10px;">Placa</th>
                    <th style="padding: 10px;">Marca & Modelo</th>
                    <th style="padding: 10px;">Tanque</th>
                    <th style="padding: 10px;">Combustível</th>
                    <th style="padding: 10px;">Status</th>
                    <th style="padding: 10px;">Ações</th>
                </tr>
            </thead>
            <tbody id="vehicleLogBody">
                <!-- Injetado pelo Banco de Dados -->
            </tbody>
        </table>
    </div>
</div>

<script>
function formatPlate(input) {
    let v = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    input.value = v;
    const mercosul = /^[A-Z]{3}[0-9][A-Z][0-9]{2}$/.test(v);
    const antigo = /^[A-Z]{3}[0-9]{4}$/.test(v);
    const hint = document.getElementById('plateHint');
    if (v.length === 7) {
        if (mercosul) { hint.style.color = 'var(--success)'; hint.textContent = '✓ Placa Mercosul válida'; }
        else if (antigo) { hint.style.color = 'var(--success)'; hint.textContent = '✓ Placa padrão antigo válida'; }
        else { hint.style.color = 'var(--danger)'; hint.textContent = '✗ Placa inválida. Use ABC1D23 (Mercosul) ou ABC1234 (Antigo)'; }
    } else {
        hint.style.color = 'var(--text-muted)';
        hint.textContent = 'Formato: 3 letras + 1 número + 1 letra + 2 números (Mercosul) ou 3 letras + 4 números (Antigo)';
    }
}
</script>
