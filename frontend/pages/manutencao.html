<!-- manutencao.html -->
<div class="page-header">
    <h2><i class="fa-solid fa-screwdriver-wrench" style="color: var(--primary-color);"></i> Lançar Manutenção</h2>
    <p>Adicione ocorrências veiculares para abater no cálculo de lucratividade da frota.</p>
</div>

<div class="form-container">
    <form id="maintenanceForm">
        <div class="form-group">
            <label><i class="fa-solid fa-car"></i> Veículo</label>
            <select name="vehicle_id" required><option value="">Selecione...</option></select>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Tipo de Serviço</label>
                <input type="text" name="service_type" placeholder="Ex: Troca de pastilhas" required>
            </div>
            <div class="form-group">
                <label>Custo (R$)</label>
                <input type="number" step="0.01" name="cost" placeholder="Ex: 150.50" required>
            </div>
        </div>

        <button type="submit" class="btn-primary"><i class="fa-solid fa-check"></i> Salvar Manutenção</button>
    </form>
</div>

<!-- CONTAINER DE HISTORICO DE MANUTENCOES -->
<div class="form-container" style="max-width: 100%; margin-top: 30px;">
    <h3 style="margin-bottom: 15px; color: var(--text-main);"><i class="fa-solid fa-clock-rotate-left"></i> Gastos com Manutenções (Log Diário)</h3>
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted);">
                    <th style="padding: 10px;">Data</th>
                    <th style="padding: 10px;">Veículo</th>
                    <th style="padding: 10px;">Serviço Realizado</th>
                    <th style="padding: 10px;">Custo Pago (R$)</th>
                    <th style="padding: 10px;">Ações</th>
                </tr>
            </thead>
            <tbody id="maintenanceLogBody">
                <!-- Injetado pelo Banco de Dados Virtual -->
            </tbody>
        </table>
    </div>
</div>
